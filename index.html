<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Speech Analyzer</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:system-ui,sans-serif;background:#f5f4f0;color:#1a1a18;padding:1rem;}
h1{font-size:20px;font-weight:500;margin-bottom:3px;}
.sub{font-size:13px;color:#666;margin-bottom:1.25rem;}
.card{background:#fff;border:1px solid #e0dfda;border-radius:12px;padding:.9rem 1.1rem;margin-bottom:.9rem;}
.section-title{font-size:13px;font-weight:500;margin-bottom:9px;color:#1a1a18;}
.debug-box{background:#f5f4f0;border-radius:8px;padding:.6rem .9rem;font-size:11px;font-family:monospace;color:#555;min-height:60px;max-height:160px;overflow-y:auto;line-height:1.6;white-space:pre-wrap;}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:.9rem;}
.btn-big{font-size:16px;padding:14px 32px;border-radius:10px;border:2px solid #1D9E75;background:#1D9E75;color:#fff;cursor:pointer;font-weight:500;-webkit-tap-highlight-color:transparent;width:100%;}
.btn-big:active{background:#0F6E56;}
.btn-big.on{background:#E24B4A;border-color:#E24B4A;}
.btn-big.on:active{background:#993C1D;}
.btn-sm{font-size:13px;padding:8px 16px;border-radius:8px;border:1px solid #ddd;background:#fff;color:#666;cursor:pointer;-webkit-tap-highlight-color:transparent;}
select{font-size:14px;padding:8px 10px;border-radius:8px;border:1px solid #ccc;background:#fff;color:#1a1a18;width:100%;margin-bottom:.75rem;}
.metrics-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:.9rem;}
.metric{background:#f5f4f0;border-radius:8px;padding:.65rem .8rem;}
.metric-label{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:#888;margin-bottom:5px;}
.metric-val{font-size:22px;font-weight:500;line-height:1;}
.metric-unit{font-size:11px;color:#888;}
.bar-wrap{height:7px;background:#e0dfda;border-radius:4px;margin-top:7px;overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;transition:width .15s,background .3s;}
.status-pill{display:inline-flex;align-items:center;gap:6px;font-size:13px;padding:6px 12px;border-radius:20px;background:#f5f4f0;color:#666;border:1px solid #e0dfda;width:100%;justify-content:center;margin-bottom:.75rem;}
.dot{width:8px;height:8px;border-radius:50%;background:#ccc;flex-shrink:0;}
.dot.green{background:#1D9E75;animation:pulse 1s infinite;}
.dot.red{background:#E24B4A;}
.dot.yellow{background:#EF9F27;animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
.canvas-wrap{height:56px;background:#f5f4f0;border-radius:8px;overflow:hidden;margin-bottom:.9rem;}
canvas{width:100%;height:100%;display:block;}
.tx-box{min-height:150px;max-height:280px;overflow-y:auto;background:#f5f4f0;border-radius:8px;padding:.8rem 1rem;font-size:16px;line-height:2;}
.interim{color:#aaa;font-style:italic;}
.word-match{background:#C0DD97;color:#27500A;border-radius:3px;padding:1px 4px;}
.word-miss{background:#F7C1C1;color:#791F1F;border-radius:3px;padding:1px 4px;}
.word-partial{background:#FAC775;color:#633806;border-radius:3px;padding:1px 4px;}
.badge{font-size:12px;padding:4px 10px;border-radius:6px;display:inline-block;margin:2px;}
.bg{background:#C0DD97;color:#27500A;}.bw{background:#FAC775;color:#633806;}.bb{background:#F7C1C1;color:#791F1F;}.bi{background:#B5D4F4;color:#0C447C;}
.tab-row{display:flex;border-bottom:1px solid #e0dfda;margin-bottom:.9rem;}
.tab{font-size:13px;padding:8px 14px 11px;cursor:pointer;color:#888;border:none;background:none;border-bottom:2px solid transparent;margin-bottom:-1px;-webkit-tap-highlight-color:transparent;}
.tab.active{color:#1a1a18;border-bottom-color:#1a1a18;font-weight:500;}
.panel{display:none;}.panel.active{display:block;}
textarea{width:100%;min-height:100px;resize:vertical;font-size:14px;padding:10px;border-radius:8px;border:1px solid #ccc;background:#fff;font-family:system-ui,sans-serif;line-height:1.6;}
textarea:focus{outline:none;border-color:#888;}
.legend{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px;}
.legend-item{font-size:11px;display:flex;align-items:center;gap:4px;}
.swatch{width:11px;height:11px;border-radius:2px;display:inline-block;}
.alert{background:#FFF3CD;border:1px solid #FAC775;border-radius:8px;padding:.75rem 1rem;font-size:13px;color:#633806;margin-bottom:.9rem;display:none;}
</style>
</head>
<body>

<h1>Speech Analyzer</h1>
<p class="sub">Transcription · Volume · Clarity · Reference compare</p>

<div class="alert" id="alertBox"></div>

<div class="tab-row">
  <button class="tab active" onclick="switchTab('main')">Transcribe</button>
  <button class="tab" onclick="switchTab('compare')">Reference & compare</button>
  <button class="tab" onclick="switchTab('debug')">Debug log</button>
</div>

<!-- TRANSCRIBE TAB -->
<div class="panel active" id="panel-main">
  <div class="card">
    <select id="langSel">
      <option value="en-US">English (US)</option>
      <option value="en-GB">English (UK)</option>
      <option value="es-ES">Spanish (ES)</option>
      <option value="es-MX">Spanish (MX)</option>
      <option value="fr-FR">French</option>
      <option value="de-DE">German</option>
      <option value="pt-BR">Portuguese (BR)</option>
      <option value="it-IT">Italian</option>
      <option value="ja-JP">Japanese</option>
      <option value="zh-CN">Chinese</option>
    </select>
    <div class="status-pill"><span class="dot" id="dotEl"></span><span id="statusLbl">Tap Start to begin</span></div>
    <button class="btn-big" id="recBtn" onclick="toggleRec()">&#9679;&nbsp; Start listening</button>
    <div style="margin-top:8px;display:flex;gap:8px;">
      <button class="btn-sm" onclick="clearAll()" style="flex:1;">Clear</button>
    </div>
  </div>

  <div class="canvas-wrap"><canvas id="waveCanvas"></canvas></div>

  <div class="metrics-row">
    <div class="metric">
      <div class="metric-label">Volume</div>
      <div><span class="metric-val" id="volVal">—</span><span class="metric-unit"> dB</span></div>
      <div class="bar-wrap"><div class="bar-fill" id="volBar" style="width:0%;background:#1D9E75"></div></div>
    </div>
    <div class="metric">
      <div class="metric-label">Clarity</div>
      <div><span class="metric-val" id="clarVal">—</span><span class="metric-unit"> %</span></div>
      <div class="bar-wrap"><div class="bar-fill" id="clarBar" style="width:0%;background:#378ADD"></div></div>
    </div>
    <div class="metric">
      <div class="metric-label">Words</div>
      <div class="metric-val" id="wordCnt">0</div>
    </div>
  </div>

  <div class="card">
    <div class="section-title">Transcript</div>
    <div class="tx-box" id="txBox"><span style="color:#aaa;font-size:14px">Tap Start, then speak...</span></div>
    <div style="margin-top:10px;" id="txBadges"></div>
  </div>
</div>

<!-- COMPARE TAB -->
<div class="panel" id="panel-compare">
  <div class="card">
    <div class="section-title">Reference text (what should be said)</div>
    <textarea id="refInput" placeholder="Type or paste the expected text. Words will be highlighted in real time as the speaker says them."></textarea>
    <div style="margin-top:10px;">
      <label style="font-size:13px;color:#666;">Upload .txt: </label>
      <input type="file" accept=".txt" id="fileUp" onchange="loadTxt(event)" style="font-size:13px;color:#666;">
    </div>
  </div>
  <div class="card" id="cmpCard" style="display:none;">
    <div class="section-title">Word-by-word comparison</div>
    <div class="tx-box" id="cmpBox"></div>
    <div class="legend">
      <span class="legend-item"><span class="swatch" style="background:#C0DD97"></span>Matched</span>
      <span class="legend-item"><span class="swatch" style="background:#FAC775"></span>Partial</span>
      <span class="legend-item"><span class="swatch" style="background:#F7C1C1"></span>Not said</span>
    </div>
    <div style="margin-top:10px;" id="cmpBadges"></div>
  </div>
</div>

<!-- DEBUG TAB -->
<div class="panel" id="panel-debug">
  <div class="card">
    <div class="section-title">Debug log</div>
    <div class="debug-box" id="debugBox"></div>
    <button class="btn-sm" onclick="document.getElementById('debugBox').textContent=''" style="margin-top:8px;">Clear log</button>
  </div>
</div>

<script>
// ── Logging ──────────────────────────────────────────────────────────────
const log = (...a) => {
  const b = document.getElementById('debugBox');
  b.textContent += '['+new Date().toLocaleTimeString()+'] '+a.join(' ')+'\n';
  b.scrollTop = b.scrollHeight;
};

// ── Diagnostics ──────────────────────────────────────────────────────────
(function(){
  log('UA: '+navigator.userAgent.slice(-80));
  log('Protocol: '+location.protocol);
  log('Host: '+location.host);
  const SR = window.SpeechRecognition||window.webkitSpeechRecognition;
  log('SpeechRecognition: '+(SR?'AVAILABLE ✓':'NOT FOUND ✗'));
  if(!SR){
    showAlert('Your browser does not support Speech Recognition. Please use Google Chrome.');
  }
  if(location.protocol !== 'https:' && location.hostname !== 'localhost'){
    log('WARNING: Not HTTPS — mic blocked on Android');
    showAlert('This page needs to be served over HTTPS for the microphone to work on Android.');
  }
  navigator.permissions && navigator.permissions.query({name:'microphone'})
    .then(r=>{ log('Mic permission: '+r.state); if(r.state==='denied') showAlert('Microphone is blocked. Go to Chrome Settings → Site Settings → Microphone and allow this site.'); })
    .catch(()=>log('Mic permission query: not supported'));
  log('Init done.');
})();

function showAlert(msg){ const a=document.getElementById('alertBox'); a.textContent=msg; a.style.display='block'; }

// ── State ────────────────────────────────────────────────────────────────
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let rec = null, isRec = false;
let txFinal = '', clarScores = [], wordList = [];
let audioCtx, analyser, micStream, animId, volTimer;
let restartTimer = null;

// ── Tab switching ────────────────────────────────────────────────────────
function switchTab(id){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['main','compare','debug'][i]===id));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+id).classList.add('active');
}

// ── Status ───────────────────────────────────────────────────────────────
function setStatus(state, msg){
  const d = document.getElementById('dotEl');
  d.className = 'dot'+(state==='on'?' green':state==='err'?' red':state==='wait'?' yellow':'');
  document.getElementById('statusLbl').textContent = msg;
}

// ── Build recognition (single-shot mode for Android) ────────────────────
function buildRec(){
  if(!SR){ log('SR not available'); return null; }
  const r = new SR();
  // KEY: on Android Chrome, continuous=true often breaks silently.
  // We use continuous=false and restart manually after each result.
  r.continuous = false;
  r.interimResults = true;
  r.maxAlternatives = 1;
  r.lang = document.getElementById('langSel').value;
  log('Building rec — lang='+r.lang+' continuous=false interimResults=true');

  r.onstart = () => { log('onstart ✓'); setStatus('on', 'Listening...'); };
  r.onaudiostart = () => log('onaudiostart ✓');
  r.onsoundstart = () => log('onsoundstart ✓ — sound detected');
  r.onspeechstart = () => log('onspeechstart ✓ — speech detected');
  r.onspeechend = () => log('onspeechend');
  r.onaudioend = () => log('onaudioend');

  r.onerror = (e) => {
    log('onerror: '+e.error + (e.message ? ' — '+e.message : ''));
    if(e.error === 'not-allowed'){
      showAlert('Microphone blocked. Tap the lock icon in Chrome address bar → Permissions → Microphone → Allow.');
      stopRec(); return;
    }
    if(e.error === 'network'){
      log('Network error — Speech API needs internet (Google servers)');
      setStatus('err','Network error');
      return;
    }
    if(e.error === 'no-speech'){
      log('No speech — restarting');
      scheduleRestart();
      return;
    }
    if(e.error === 'aborted'){ log('Aborted — restarting'); scheduleRestart(); return; }
    setStatus('err', e.error);
  };

  r.onresult = (e) => {
    log('onresult: '+e.results.length+' result(s)');
    let fin = '', itr = '';
    for(let i = e.resultIndex; i < e.results.length; i++){
      const res = e.results[i];
      const txt = res[0].transcript;
      const conf = res[0].confidence;
      log((res.isFinal?'FINAL':'interim')+': "'+txt.trim()+'" conf='+(conf>0?Math.round(conf*100)+'%':'n/a'));
      if(res.isFinal){
        fin += txt;
        txt.trim().split(/\s+/).filter(Boolean).forEach(w => {
          wordList.push({raw:w, word:w.toLowerCase().replace(/[^\wáéíóúüñ]/gi,'')});
        });
        if(conf > 0){ clarScores.push(conf); updateClarity(conf); }
      } else {
        itr += txt;
      }
    }
    if(fin) txFinal += (txFinal?' ':'') + fin.trim();
    renderTx(itr);
    updateWordCount();
    runCompare();
  };

  r.onend = () => {
    log('onend — isRec='+isRec);
    if(isRec){ scheduleRestart(); }
    else { setStatus('', 'Stopped'); }
  };

  return r;
}

function scheduleRestart(){
  if(!isRec) return;
  setStatus('wait', 'Restarting...');
  clearTimeout(restartTimer);
  restartTimer = setTimeout(() => {
    if(!isRec) return;
    log('Restarting recognition...');
    try {
      rec = buildRec();
      rec.start();
    } catch(e){ log('Restart failed: '+e.message); setStatus('err','Restart failed'); }
  }, 300);
}

// ── Toggle ───────────────────────────────────────────────────────────────
async function toggleRec(){
  if(isRec) stopRec();
  else await startRec();
}

async function startRec(){
  log('=== START ===');
  log('Requesting microphone...');
  try{
    micStream = await navigator.mediaDevices.getUserMedia({audio:true, video:false});
    log('Mic granted ✓ tracks='+micStream.getAudioTracks().length);
  } catch(e){
    log('Mic DENIED: '+e.name+' — '+e.message);
    showAlert('Microphone access denied: '+e.message+'. Tap the lock icon in Chrome → allow Microphone.');
    setStatus('err', 'Mic denied'); return;
  }

  // Audio analyser for waveform + volume
  try{
    audioCtx = new(window.AudioContext||window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 512;
    audioCtx.createMediaStreamSource(micStream).connect(analyser);
    drawWave(); volLoop();
    log('Audio analyser ✓ sampleRate='+audioCtx.sampleRate);
  } catch(e){ log('Audio analyser err: '+e.message); }

  isRec = true;
  rec = buildRec();
  if(!rec){ isRec=false; return; }
  try{ rec.start(); log('rec.start() called'); }
  catch(e){ log('rec.start() err: '+e.message); isRec=false; return; }

  const btn = document.getElementById('recBtn');
  btn.textContent = '⬛  Stop listening';
  btn.classList.add('on');
}

function stopRec(){
  log('=== STOP ===');
  isRec = false;
  clearTimeout(restartTimer);
  if(rec){ try{ rec.abort(); }catch(e){} rec=null; }
  if(micStream){ micStream.getTracks().forEach(t=>t.stop()); micStream=null; }
  if(audioCtx){ audioCtx.close(); audioCtx=null; analyser=null; }
  if(animId){ cancelAnimationFrame(animId); animId=null; }
  clearTimeout(volTimer);
  const btn = document.getElementById('recBtn');
  btn.textContent = '● Start listening';
  btn.classList.remove('on');
  setStatus('', 'Stopped');
  document.getElementById('volVal').textContent = '—';
  document.getElementById('volBar').style.width = '0%';
  clearWave();
}

// ── Volume loop ──────────────────────────────────────────────────────────
function volLoop(){
  if(!analyser || !isRec) return;
  const buf = new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteFrequencyData(buf);
  const avg = buf.reduce((a,b)=>a+b,0)/buf.length;
  const db = avg > 1 ? Math.round(20*Math.log10(avg/255)) : -60;
  const pct = Math.round(Math.max(0, Math.min(100, (avg/255)*100)));
  document.getElementById('volVal').textContent = db;
  document.getElementById('volBar').style.width = pct+'%';
  document.getElementById('volBar').style.background = pct>65?'#E24B4A':pct>30?'#EF9F27':'#1D9E75';
  volTimer = setTimeout(volLoop, 100);
}

// ── Waveform ─────────────────────────────────────────────────────────────
function drawWave(){
  const cv = document.getElementById('waveCanvas');
  cv.width = cv.offsetWidth||400; cv.height = cv.offsetHeight||56;
  const ctx = cv.getContext('2d'), W=cv.width, H=cv.height;
  function frame(){
    if(!analyser){ return; }
    animId = requestAnimationFrame(frame);
    const buf = new Uint8Array(analyser.fftSize);
    analyser.getByteTimeDomainData(buf);
    ctx.clearRect(0,0,W,H);
    ctx.strokeStyle='#378ADD'; ctx.lineWidth=1.5; ctx.beginPath();
    const step=W/buf.length; let x=0;
    for(let i=0;i<buf.length;i++){
      const y=((buf[i]/128)-1)*(H/2)+(H/2);
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y); x+=step;
    }
    ctx.stroke();
  }
  frame();
}
function clearWave(){ const cv=document.getElementById('waveCanvas'); cv.getContext('2d').clearRect(0,0,cv.width,cv.height); }

// ── Render transcript ────────────────────────────────────────────────────
function renderTx(interim){
  const box = document.getElementById('txBox');
  const ref = document.getElementById('refInput').value.trim();
  if(!txFinal && !interim){
    box.innerHTML='<span style="color:#aaa;font-size:14px">Start speaking...</span>'; return;
  }
  let html = ref ? colorize(txFinal, ref) : esc(txFinal);
  if(interim) html += ' <span class="interim">'+esc(interim)+'</span>';
  box.innerHTML = html;
  box.scrollTop = box.scrollHeight;
  const avg = clarScores.length ? clarScores.reduce((a,b)=>a+b,0)/clarScores.length : 0;
  document.getElementById('txBadges').innerHTML = avg>0
    ? `<span class="badge ${avg>.75?'bg':avg>.5?'bw':'bb'}">Avg clarity ${Math.round(avg*100)}%</span>
       <span class="badge bi">${wordList.length} words</span>` : '';
}

function colorize(spoken, ref){
  const rw = norm(ref).split(/\s+/).filter(Boolean);
  return spoken.trim().split(/\s+/).filter(Boolean).map(w=>{
    const c = norm(w);
    if(rw.includes(c)) return `<span class="word-match">${esc(w)}</span>`;
    if(rw.some(r=>r.length>3&&(r.startsWith(c.slice(0,3))||c.startsWith(r.slice(0,3))))) return `<span class="word-partial">${esc(w)}</span>`;
    return `<span class="word-miss">${esc(w)}</span>`;
  }).join(' ');
}

function runCompare(){
  const ref = document.getElementById('refInput').value.trim();
  if(!ref||!txFinal){ document.getElementById('cmpCard').style.display='none'; return; }
  document.getElementById('cmpCard').style.display='block';
  const rw=norm(ref).split(/\s+/).filter(Boolean), sw=norm(txFinal).split(/\s+/).filter(Boolean);
  document.getElementById('cmpBox').innerHTML = rw.map(w=>{
    if(sw.includes(w)) return `<span class="word-match">${esc(w)}</span>`;
    if(sw.some(s=>s.length>3&&(s.startsWith(w.slice(0,3))||w.startsWith(s.slice(0,3))))) return `<span class="word-partial">${esc(w)}</span>`;
    return `<span class="word-miss">${esc(w)}</span>`;
  }).join(' ');
  const matched=rw.filter(w=>sw.includes(w)).length, pct=Math.round(matched/rw.length*100);
  document.getElementById('cmpBadges').innerHTML =
    `<span class="badge ${pct>=80?'bg':pct>=50?'bw':'bb'}">Match ${pct}%</span>
     <span class="badge bi">${matched}/${rw.length} matched</span>
     <span class="badge bb">${rw.length-matched} missing</span>`;
}

function updateClarity(c){
  const p=Math.round(c*100);
  document.getElementById('clarVal').textContent=p;
  document.getElementById('clarBar').style.width=p+'%';
  document.getElementById('clarBar').style.background=p>75?'#1D9E75':p>50?'#EF9F27':'#E24B4A';
}
function updateWordCount(){ document.getElementById('wordCnt').textContent=wordList.length; }

function clearAll(){
  txFinal=''; clarScores=[]; wordList=[];
  renderTx('');
  document.getElementById('wordCnt').textContent='0';
  document.getElementById('clarVal').textContent='—';
  document.getElementById('clarBar').style.width='0%';
  document.getElementById('cmpCard').style.display='none';
  log('Cleared.');
}

function loadTxt(e){
  const f=e.target.files[0]; if(!f)return;
  const fr=new FileReader();
  fr.onload=ev=>{ document.getElementById('refInput').value=ev.target.result.trim(); runCompare(); log('File loaded: '+f.name); };
  fr.readAsText(f);
}

document.getElementById('refInput').addEventListener('input',()=>{ renderTx(''); runCompare(); });

function norm(s){ return s.toLowerCase().replace(/[^\wáéíóúüñ\s]/gi,'').replace(/\s+/g,' ').trim(); }
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
