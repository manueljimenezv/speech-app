<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Speech Analyzer</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:system-ui,sans-serif;background:#f5f4f0;color:#1a1a18;padding:1rem;}
h1{font-size:20px;font-weight:500;margin-bottom:3px;}
.sub{font-size:13px;color:#666;margin-bottom:1.25rem;}
.card{background:#fff;border:1px solid #e0dfda;border-radius:12px;padding:.9rem 1.1rem;margin-bottom:.9rem;}
.stitle{font-size:13px;font-weight:500;margin-bottom:9px;}
.debug-box{background:#f5f4f0;border-radius:8px;padding:.6rem .9rem;font-size:11px;font-family:monospace;color:#555;min-height:60px;max-height:240px;overflow-y:auto;line-height:1.6;white-space:pre-wrap;}
.btn-big{font-size:16px;padding:14px 0;border-radius:10px;border:2px solid #1D9E75;background:#1D9E75;color:#fff;cursor:pointer;font-weight:500;width:100%;margin-bottom:8px;-webkit-tap-highlight-color:transparent;}
.btn-big:active{background:#0F6E56;}
.btn-big.on{background:#E24B4A;border-color:#E24B4A;}
.btn-sm{font-size:13px;padding:8px 16px;border-radius:8px;border:1px solid #ddd;background:#fff;color:#666;cursor:pointer;}
select{font-size:14px;padding:8px 10px;border-radius:8px;border:1px solid #ccc;background:#fff;color:#1a1a18;width:100%;margin-bottom:.75rem;}
.metrics-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:.9rem;}
.metric{background:#f5f4f0;border-radius:8px;padding:.65rem .8rem;}
.mlabel{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:#888;margin-bottom:5px;}
.mval{font-size:22px;font-weight:500;line-height:1;}
.munit{font-size:11px;color:#888;}
.bar-wrap{height:7px;background:#e0dfda;border-radius:4px;margin-top:7px;overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;transition:width .1s,background .3s;}
.status-pill{display:flex;align-items:center;gap:6px;font-size:13px;padding:6px 12px;border-radius:20px;background:#f5f4f0;color:#666;border:1px solid #e0dfda;width:100%;justify-content:center;margin-bottom:.75rem;}
.dot{width:8px;height:8px;border-radius:50%;background:#ccc;flex-shrink:0;}
.dot.green{background:#1D9E75;animation:pulse 1s infinite;}
.dot.red{background:#E24B4A;}
.dot.yellow{background:#EF9F27;animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
.canvas-wrap{height:56px;background:#f5f4f0;border-radius:8px;overflow:hidden;margin-bottom:.9rem;}
canvas{width:100%;height:100%;display:block;}
.tx-box{min-height:160px;max-height:300px;overflow-y:auto;background:#f5f4f0;border-radius:8px;padding:.8rem 1rem;font-size:16px;line-height:2;}
.interim{color:#999;font-style:italic;}
.word-match{background:#C0DD97;color:#27500A;border-radius:3px;padding:1px 4px;}
.word-miss{background:#F7C1C1;color:#791F1F;border-radius:3px;padding:1px 4px;}
.word-partial{background:#FAC775;color:#633806;border-radius:3px;padding:1px 4px;}
.badge{font-size:12px;padding:4px 10px;border-radius:6px;display:inline-block;margin:2px;}
.bg{background:#C0DD97;color:#27500A;}.bw{background:#FAC775;color:#633806;}.bb{background:#F7C1C1;color:#791F1F;}.bi{background:#B5D4F4;color:#0C447C;}
.tab-row{display:flex;border-bottom:1px solid #e0dfda;margin-bottom:.9rem;}
.tab{font-size:13px;padding:8px 14px 11px;cursor:pointer;color:#888;border:none;background:none;border-bottom:2px solid transparent;margin-bottom:-1px;-webkit-tap-highlight-color:transparent;}
.tab.active{color:#1a1a18;border-bottom-color:#1a1a18;font-weight:500;}
.panel{display:none;}.panel.active{display:block;}
textarea{width:100%;min-height:100px;resize:vertical;font-size:14px;padding:10px;border-radius:8px;border:1px solid #ccc;background:#fff;font-family:system-ui,sans-serif;line-height:1.6;}
textarea:focus{outline:none;border-color:#888;}
.legend{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px;}
.legend-item{font-size:11px;display:flex;align-items:center;gap:4px;}
.swatch{width:11px;height:11px;border-radius:2px;display:inline-block;}
.alert{background:#FFF3CD;border:1px solid #FAC775;border-radius:8px;padding:.75rem 1rem;font-size:13px;color:#633806;margin-bottom:.9rem;display:none;}
.small{font-size:12px;color:#666;line-height:1.5;}
</style>
</head>
<body>
<h1>Speech Analyzer</h1>
<p class="sub">Transcription · Volume · Clarity · Reference compare</p>
<div class="alert" id="alertBox"></div>

<div class="tab-row">
  <button class="tab active" onclick="switchTab('main')">Transcribe</button>
  <button class="tab" onclick="switchTab('compare')">Reference</button>
  <button class="tab" onclick="switchTab('debug')">Debug</button>
</div>

<div class="panel active" id="panel-main">
  <div class="card">
    <select id="langSel">
      <option value="en-US">English (US)</option>
      <option value="en-GB">English (UK)</option>
      <option value="es-ES">Spanish (ES)</option>
      <option value="es-MX">Spanish (MX)</option>
      <option value="fr-FR">French</option>
      <option value="de-DE">German</option>
      <option value="pt-BR">Portuguese (BR)</option>
      <option value="it-IT">Italian</option>
      <option value="ja-JP">Japanese</option>
      <option value="zh-CN">Chinese</option>
    </select>
    <div class="status-pill"><span class="dot" id="dotEl"></span><span id="statusLbl">Tap Start</span></div>
    <button class="btn-big" id="recBtn" onclick="toggleRec()">&#9679;&nbsp; Start listening</button>
    <button class="btn-sm" onclick="clearAll()">Clear</button>
  </div>

  <div class="canvas-wrap" id="waveWrap" style="display:none"><canvas id="waveCanvas"></canvas></div>

  <div class="metrics-row">
    <div class="metric">
      <div class="mlabel">Volume</div>
      <div><span class="mval" id="volVal">—</span><span class="munit"> dB</span></div>
      <div class="bar-wrap"><div class="bar-fill" id="volBar" style="width:0%;background:#1D9E75"></div></div>
    </div>
    <div class="metric">
      <div class="mlabel">Clarity</div>
      <div><span class="mval" id="clarVal">—</span><span class="munit"> %</span></div>
      <div class="bar-wrap"><div class="bar-fill" id="clarBar" style="width:0%;background:#378ADD"></div></div>
    </div>
    <div class="metric">
      <div class="mlabel">Words</div>
      <div class="mval" id="wordCnt">0</div>
    </div>
  </div>

  <div class="card">
    <div class="stitle">Transcript</div>
    <div class="tx-box" id="txBox"><span style="color:#aaa;font-size:14px">Tap Start, then speak clearly...</span></div>
    <div style="margin-top:10px;" id="txBadges"></div>
  </div>

  <div class="card">
    <div class="stitle">Mode notes</div>
    <div class="small" id="modeNote">Hybrid mode active.</div>
  </div>
</div>

<div class="panel" id="panel-compare">
  <div class="card">
    <div class="stitle">Reference text</div>
    <textarea id="refInput" placeholder="Type or paste the text the speaker should say."></textarea>
    <div style="margin-top:10px;">
      <label style="font-size:13px;color:#666;">Upload .txt: </label>
      <input type="file" accept=".txt" id="fileUp" onchange="loadTxt(event)" style="font-size:13px;color:#666;">
    </div>
  </div>
  <div class="card" id="cmpCard" style="display:none;">
    <div class="stitle">Word-by-word comparison</div>
    <div class="tx-box" id="cmpBox"></div>
    <div class="legend">
      <span class="legend-item"><span class="swatch" style="background:#C0DD97"></span>Matched</span>
      <span class="legend-item"><span class="swatch" style="background:#FAC775"></span>Partial</span>
      <span class="legend-item"><span class="swatch" style="background:#F7C1C1"></span>Not said</span>
    </div>
    <div style="margin-top:10px;" id="cmpBadges"></div>
  </div>
</div>

<div class="panel" id="panel-debug">
  <div class="card">
    <div class="stitle">Debug log</div>
    <div class="debug-box" id="debugBox"></div>
    <button class="btn-sm" onclick="document.getElementById('debugBox').textContent=''" style="margin-top:8px;">Clear log</button>
  </div>
</div>

<script>
const log = (...a) => {
  const b = document.getElementById('debugBox');
  b.textContent += '['+new Date().toLocaleTimeString()+'] '+a.join(' ')+'\\n';
  b.scrollTop = b.scrollHeight;
};
function showAlert(m){
  const a=document.getElementById('alertBox');
  a.textContent=m;
  a.style.display='block';
}
function hideAlert(){
  const a=document.getElementById('alertBox');
  a.textContent='';
  a.style.display='none';
}

const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

let rec = null, isRec = false;
let sessCount = 0;
let restartTimer = null, restartInFlight = false;
let volCtx = null, volAnalyser = null, volStream = null, volAnimId = null, volTimer = null, volDelayTimer = null;
let txFinal = '', txInterim = '', manualStop = false;
let finalByIndex = {};
let clarityByIndex = {};

const ua = navigator.userAgent || '';
const IS_ANDROID = /Android/i.test(ua);
const IS_IOS = /iPhone|iPad|iPod/i.test(ua);
const ENABLE_VOLUME_METER = !IS_ANDROID;
const RESTART_DELAY_MS = IS_ANDROID ? 1200 : 800;
const MODE_NOTE = ENABLE_VOLUME_METER
  ? 'Volume meter enabled. On Android it is disabled automatically to protect transcript stability.'
  : 'Android mode: volume meter is disabled automatically, and transcript assembly is index-safe to avoid repeated final text.';

(function(){
  log('UA: '+navigator.userAgent.slice(-100));
  log('Protocol: '+location.protocol+' Host: '+location.host);
  log('SpeechRecognition: '+(SR?'AVAILABLE ✓':'NOT FOUND ✗'));
  log('IS_ANDROID='+IS_ANDROID+' IS_IOS='+IS_IOS);
  log('ENABLE_VOLUME_METER='+ENABLE_VOLUME_METER+' RESTART_DELAY_MS='+RESTART_DELAY_MS);
  document.getElementById('modeNote').textContent = MODE_NOTE;

  if(!SR) showAlert('Speech Recognition not available in this browser.');
  if(!ENABLE_VOLUME_METER){
    document.getElementById('waveWrap').style.display='none';
    document.getElementById('volVal').textContent='OFF';
    document.getElementById('volBar').style.width='0%';
  }

  navigator.permissions && navigator.permissions.query({name:'microphone'})
    .then(r=>log('Mic permission: '+r.state))
    .catch(()=>log('Mic permission: n/a'));
  log('Init done.');
})();

function switchTab(id){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['main','compare','debug'][i]===id));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+id).classList.add('active');
}
function setStatus(state,msg){
  document.getElementById('dotEl').className='dot'+(state==='on'?' green':state==='err'?' red':state==='wait'?' yellow':'');
  document.getElementById('statusLbl').textContent=msg;
}
function sortedFinalText(){
  return Object.keys(finalByIndex)
    .map(Number)
    .sort((a,b)=>a-b)
    .map(i=>finalByIndex[i])
    .filter(Boolean)
    .join(' ')
    .replace(/\s+/g,' ')
    .trim();
}
function rebuildDerivedState(){
  txFinal = sortedFinalText();

  const words = txFinal
    ? txFinal.split(/\s+/).filter(Boolean).map(w => ({
        raw: w,
        word: w.toLowerCase().replace(/[^\wáéíóúüñ]/gi,'')
      }))
    : [];
  updateWordCount(words.length);

  const scores = Object.values(clarityByIndex).filter(v => typeof v === 'number' && v > 0);
  updateClarityAvg(scores);
}
function buildRec(){
  if(!SR) return null;
  const r = new SR();
  r.continuous = true;
  r.interimResults = true;
  r.maxAlternatives = 1;
  r.lang = document.getElementById('langSel').value;

  r.onstart = () => {
    restartInFlight = false;
    log('onstart ✓');
    setStatus('on','Listening...');
  };
  r.onaudiostart = () => log('onaudiostart ✓');
  r.onsoundstart = () => {
    log('onsoundstart ✓');
    setStatus('on','Sound detected...');
  };
  r.onspeechstart = () => {
    log('onspeechstart ✓ SPEECH');
    setStatus('on','Transcribing...');
  };
  r.onspeechend = () => log('onspeechend');
  r.onaudioend = () => log('onaudioend');

  r.onerror = (e) => {
    log('onerror: '+e.error+(e.message?' — '+e.message:''));

    if(e.error === 'not-allowed'){
      showAlert('Mic blocked. Allow microphone access in Chrome.');
      stopRec();
      return;
    }
    if(e.error === 'network'){
      setStatus('err','Network error');
      return;
    }
    if(e.error === 'aborted'){
      if(manualStop){
        log('aborted after manual stop, ignored');
        return;
      }
      scheduleRestart('aborted');
      return;
    }
    if(e.error === 'no-speech'){
      scheduleRestart('no-speech');
      return;
    }
    setStatus('err', e.error);
  };

  r.onresult = (e) => {
    log('onresult ✓ '+e.results.length+' result(s)');
    let interimParts = [];

    for(let i=0; i<e.results.length; i++){
      const res = e.results[i];
      const txt = (res[0] && res[0].transcript) ? res[0].transcript.trim() : '';
      const conf = (res[0] && typeof res[0].confidence === 'number') ? res[0].confidence : 0;

      log((res.isFinal?'FINAL':'interim')+'['+i+']: "'+txt+'" conf='+(conf>0?Math.round(conf*100)+'%':'n/a'));

      if(res.isFinal){
        finalByIndex[i] = txt;
        if(conf > 0) clarityByIndex[i] = conf;
      }else if(txt){
        interimParts.push(txt);
      }
    }

    txInterim = interimParts.join(' ').trim();
    rebuildDerivedState();
    renderTx();
    runCompare();
  };

  r.onend = () => {
    log('onend — isRec='+isRec+' manualStop='+manualStop);
    if(manualStop){
      setStatus('','Stopped');
      manualStop = false;
      return;
    }
    if(isRec) scheduleRestart('onend');
    else setStatus('','Stopped');
  };

  return r;
}

function scheduleRestart(reason){
  if(!isRec || restartInFlight) return;
  restartInFlight = true;
  setStatus('wait','Restarting...');
  clearTimeout(restartTimer);
  log('scheduleRestart: '+reason);

  restartTimer = setTimeout(() => {
    if(!isRec){
      restartInFlight = false;
      return;
    }
    try{
      rec = buildRec();
      rec.start();
      sessCount++;
      log('Restarted #'+sessCount);
    }catch(e){
      restartInFlight = false;
      log('Restart err: '+e.message);
      setStatus('err','Restart failed');
    }
  }, RESTART_DELAY_MS);
}

function startVolMeter(){
  if(!ENABLE_VOLUME_METER){
    log('Volume meter disabled for this device profile');
    return;
  }
  clearTimeout(volDelayTimer);
  volDelayTimer = setTimeout(async () => {
    if(!isRec) return;
    try{
      volStream = await navigator.mediaDevices.getUserMedia({audio:true, video:false});
      volCtx = new (window.AudioContext || window.webkitAudioContext)();
      volAnalyser = volCtx.createAnalyser();
      volAnalyser.fftSize = 512;
      volCtx.createMediaStreamSource(volStream).connect(volAnalyser);
      document.getElementById('waveWrap').style.display='block';
      drawWave();
      volLoop();
      log('Volume meter ✓');
    }catch(e){
      log('Volume meter err: '+e.message);
      document.getElementById('volVal').textContent='ERR';
    }
  }, 250);
}

function stopVolMeter(){
  clearTimeout(volDelayTimer);
  if(volAnimId){ cancelAnimationFrame(volAnimId); volAnimId = null; }
  clearTimeout(volTimer);
  if(volStream){ volStream.getTracks().forEach(t => t.stop()); volStream = null; }
  if(volCtx){ volCtx.close(); volCtx = null; volAnalyser = null; }

  if(ENABLE_VOLUME_METER){
    document.getElementById('waveWrap').style.display='none';
    document.getElementById('volVal').textContent='—';
    document.getElementById('volBar').style.width='0%';
  }else{
    document.getElementById('volVal').textContent='OFF';
    document.getElementById('volBar').style.width='0%';
  }
}

function volLoop(){
  if(!volAnalyser || !isRec) return;
  const buf = new Uint8Array(volAnalyser.frequencyBinCount);
  volAnalyser.getByteFrequencyData(buf);
  const avg = buf.reduce((a,b)=>a+b,0)/buf.length;
  const db = avg>1 ? Math.round(20*Math.log10(avg/255)) : -60;
  const pct = Math.round(Math.max(0, Math.min(100, (avg/255)*100)));
  document.getElementById('volVal').textContent = db;
  document.getElementById('volBar').style.width = pct+'%';
  document.getElementById('volBar').style.background = pct>65?'#E24B4A':pct>30?'#EF9F27':'#1D9E75';
  volTimer = setTimeout(volLoop,100);
}

function drawWave(){
  const cv = document.getElementById('waveCanvas');
  cv.width = cv.offsetWidth || 400;
  cv.height = cv.offsetHeight || 56;
  const ctx = cv.getContext('2d'), W = cv.width, H = cv.height;

  function frame(){
    if(!volAnalyser) return;
    volAnimId = requestAnimationFrame(frame);
    const buf = new Uint8Array(volAnalyser.fftSize);
    volAnalyser.getByteTimeDomainData(buf);
    ctx.clearRect(0,0,W,H);
    ctx.strokeStyle = '#378ADD';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    const step = W / buf.length;
    let x = 0;
    for(let i=0;i<buf.length;i++){
      const y = ((buf[i]/128)-1)*(H/2)+(H/2);
      i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
      x += step;
    }
    ctx.stroke();
  }
  frame();
}

async function toggleRec(){
  if(isRec) stopRec();
  else await startRec();
}

async function startRec(){
  hideAlert();
  log('=== START ===');
  if(!SR){
    showAlert('SpeechRecognition not available.');
    return;
  }

  isRec = true;
  sessCount = 1;
  manualStop = false;
  restartInFlight = false;
  clearTimeout(restartTimer);
  finalByIndex = {};
  clarityByIndex = {};
  txFinal = '';
  txInterim = '';

  rec = buildRec();
  if(!rec){
    isRec = false;
    return;
  }

  try{
    rec.start();
    log('rec.start() called');
  }catch(e){
    log('rec.start() err: '+e.message);
    isRec = false;
    setStatus('err','Start failed');
    return;
  }

  const btn = document.getElementById('recBtn');
  btn.textContent = '⬛  Stop listening';
  btn.classList.add('on');

  startVolMeter();
}

function stopRec(){
  log('=== STOP ===');
  isRec = false;
  manualStop = true;
  restartInFlight = false;
  clearTimeout(restartTimer);

  if(rec){
    try{ rec.abort(); }catch(e){}
    rec = null;
  }
  stopVolMeter();

  const btn = document.getElementById('recBtn');
  btn.textContent = '● Start listening';
  btn.classList.remove('on');
  setStatus('','Stopped');
}

function renderTx(){
  const box = document.getElementById('txBox');
  const ref = document.getElementById('refInput').value.trim();

  if(!txFinal && !txInterim){
    box.innerHTML = '<span style="color:#aaa;font-size:14px">Start speaking...</span>';
    return;
  }

  let html = ref ? colorize(txFinal, ref) : esc(txFinal);
  if(txInterim) html += (html ? ' ' : '') + '<span class="interim">'+esc(txInterim)+'</span>';
  box.innerHTML = html;
  box.scrollTop = box.scrollHeight;

  const scores = Object.values(clarityByIndex).filter(v => typeof v === 'number' && v > 0);
  const avg = scores.length ? scores.reduce((a,b)=>a+b,0)/scores.length : 0;
  document.getElementById('txBadges').innerHTML = avg>0
    ? `<span class="badge ${avg>.75?'bg':avg>.5?'bw':'bb'}">Avg clarity ${Math.round(avg*100)}%</span><span class="badge bi">${document.getElementById('wordCnt').textContent} words</span>`
    : (txFinal ? `<span class="badge bi">${document.getElementById('wordCnt').textContent} words</span>` : '');
}

function colorize(spoken, ref){
  const rw = norm(ref).split(/\s+/).filter(Boolean);
  return spoken.trim().split(/\s+/).filter(Boolean).map(w => {
    const c = norm(w);
    if(rw.includes(c)) return `<span class="word-match">${esc(w)}</span>`;
    if(rw.some(r => r.length>3 && (r.startsWith(c.slice(0,3)) || c.startsWith(r.slice(0,3))))) return `<span class="word-partial">${esc(w)}</span>`;
    return `<span class="word-miss">${esc(w)}</span>`;
  }).join(' ');
}

function runCompare(){
  const ref = document.getElementById('refInput').value.trim();
  if(!ref || !txFinal){
    document.getElementById('cmpCard').style.display='none';
    return;
  }
  document.getElementById('cmpCard').style.display='block';
  const rw = norm(ref).split(/\s+/).filter(Boolean), sw = norm(txFinal).split(/\s+/).filter(Boolean);
  document.getElementById('cmpBox').innerHTML = rw.map(w => {
    if(sw.includes(w)) return `<span class="word-match">${esc(w)}</span>`;
    if(sw.some(s => s.length>3 && (s.startsWith(w.slice(0,3)) || w.startsWith(s.slice(0,3))))) return `<span class="word-partial">${esc(w)}</span>`;
    return `<span class="word-miss">${esc(w)}</span>`;
  }).join(' ');
  const matched = rw.filter(w => sw.includes(w)).length;
  const pct = rw.length ? Math.round(matched/rw.length*100) : 0;
  document.getElementById('cmpBadges').innerHTML =
    `<span class="badge ${pct>=80?'bg':pct>=50?'bw':'bb'}">Match ${pct}%</span><span class="badge bi">${matched}/${rw.length} matched</span><span class="badge bb">${rw.length-matched} missing</span>`;
}

function updateClarityAvg(scores){
  if(!scores || !scores.length){
    document.getElementById('clarVal').textContent='—';
    document.getElementById('clarBar').style.width='0%';
    return;
  }
  const avg = scores.reduce((a,b)=>a+b,0)/scores.length;
  const p = Math.round(avg*100);
  document.getElementById('clarVal').textContent = p;
  document.getElementById('clarBar').style.width = p+'%';
  document.getElementById('clarBar').style.background = p>75?'#1D9E75':p>50?'#EF9F27':'#E24B4A';
}
function updateWordCount(count){
  document.getElementById('wordCnt').textContent = count || 0;
}
function clearAll(){
  finalByIndex = {};
  clarityByIndex = {};
  txFinal = '';
  txInterim = '';
  renderTx();
  updateWordCount(0);
  updateClarityAvg([]);
  document.getElementById('cmpCard').style.display='none';
  log('Cleared.');
}
function loadTxt(e){
  const f = e.target.files[0];
  if(!f) return;
  const fr = new FileReader();
  fr.onload = ev => {
    document.getElementById('refInput').value = ev.target.result.trim();
    runCompare();
    renderTx();
    log('File: '+f.name);
  };
  fr.readAsText(f);
}
document.getElementById('refInput').addEventListener('input', () => {
  renderTx();
  runCompare();
});
document.getElementById('langSel').addEventListener('change', () => {
  log('Language changed to '+document.getElementById('langSel').value);
  if(isRec){
    stopRec();
    setTimeout(() => startRec(), 500);
  }
});

function norm(s){ return (s||'').toLowerCase().replace(/[^\wáéíóúüñ\s]/gi,'').replace(/\s+/g,' ').trim(); }
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
